version: "3.9"

services:
  db:
    image: postgres:16
    container_name: portal_docs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portal_docs
    ports:
      - "5432:5432"
    volumes:
      - portal_docs_db_data:/var/lib/postgresql/data

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: portal_docs_api
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "3001:3001"
    depends_on:
      - db

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: portal_docs_web
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  portal_docs_db_data:
